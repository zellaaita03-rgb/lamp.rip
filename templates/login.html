{% extends "base.html" %}

{% block title %}Login - lamp.rip{% endblock %}

{% block styles %}
<style>
    .auth-footer {
        text-align: center;
        margin-top: 1.5rem;
        color: var(--text-secondary);
    }
    
    .auth-footer a {
        color: var(--accent);
        text-decoration: none;
    }
    
    .auth-footer a:hover {
        text-decoration: underline;
    }
    
    .test-account {
        background: rgba(255, 107, 53, 0.1);
        border: 1px solid rgba(255, 107, 53, 0.3);
        border-radius: 10px;
        padding: 1rem;
        margin-bottom: 1.5rem;
        text-align: center;
    }
    
    .test-account p {
        margin: 0;
        font-size: 0.9rem;
    }
    
    .test-account strong {
        color: var(--accent);
    }
</style>
{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <div class="auth-logo">
            <div class="logo">lamp<span>.rip</span></div>
        </div>
        
        <p class="auth-subtitle">Welcome back</p>
        
        <div class="test-account">
            <p><strong>Test Account:</strong> admin / admin</p>
        </div>
        
        <form method="POST">
            <div class="form-group">
                <label class="form-label" for="username">Username</label>
                <input type="text" id="username" name="username" class="form-input" placeholder="Enter your username" required autofocus>
            </div>
            
            <div class="form-group">
                <label class="form-label" for="password">Password</label>
                <input type="password" id="password" name="password" class="form-input" placeholder="Enter your password" required>
            </div>
            
            <button type="submit" class="btn btn-primary" style="width: 100%; justify-content: center;">
                <i class="fas fa-sign-in-alt"></i> Sign In
            </button>
        </form>
        
        <p class="auth-footer">
            Don't have an account? <a href="{{ url_for('register') }}">Create one</a>
        </p>
    </div>
</div>
{% endblock %}
